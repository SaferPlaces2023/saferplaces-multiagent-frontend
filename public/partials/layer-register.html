<!-- Overlay registrazione layer -->
<section id="layerRegModal" class="layer-reg hidden" aria-modal="true" role="dialog">
    <div class="layer-reg-card">
        <h6 class="mb-2">Register a new layer</h6>
        <p class="small text-secondary mb-2">Confirm layer details before adding it to map.</p>

        <div class="mb-2">
            <label class="form-label small">Source (URL)</label>
            <input id="lrSrc" class="form-control form-control-sm" readonly>
        </div>

        <div class="mb-2">
            <label class="form-label small">Title</label>
            <input id="lrTitle" class="form-control form-control-sm" placeholder="es. Venice buildings">
        </div>

        <div class="mb-2">
            <label class="form-label small">Description</label>
            <textarea id="lrDesc" class="form-control form-control-sm" rows="2" placeholder="breve descrizione…" spellcheck="false"></textarea>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-3">
            <button id="lrCancel" class="btn btn-outline-light btn-sm">Cancel</button>
            <button id="lrConfirm" class="btn btn-success btn-sm">Confirm</button>
        </div>

        <div id="lrError" class="small text-danger d-none mt-2">Insert at least the title.</div>
    </div>
</section>
