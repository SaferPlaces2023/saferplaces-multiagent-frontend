<!-- Overlay registrazione layer -->
<section id="layerRegModal" class="layer-reg hidden" aria-modal="true" role="dialog">
    <div class="layer-reg-card">
        <h6 class="mb-2">Registra layer</h6>
        <p class="small text-secondary mb-2">Conferma i dettagli del layer prima di aggiungerlo alla mappa.</p>

        <div class="mb-2">
            <label class="form-label small">Sorgente (URL)</label>
            <input id="lrSrc" class="form-control form-control-sm" readonly>
        </div>

        <div class="mb-2">
            <label class="form-label small">Titolo</label>
            <input id="lrTitle" class="form-control form-control-sm" placeholder="es. edifici Vicenza">
        </div>

        <div class="mb-2">
            <label class="form-label small">Descrizione</label>
            <textarea id="lrDesc" class="form-control form-control-sm" rows="2" placeholder="breve descrizione…" spellcheck="false"></textarea>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-3">
            <button id="lrCancel" class="btn btn-outline-light btn-sm">Annulla</button>
            <button id="lrConfirm" class="btn btn-success btn-sm">Conferma</button>
        </div>

        <div id="lrError" class="small text-danger d-none mt-2">Compila almeno il titolo.</div>
    </div>
</section>
