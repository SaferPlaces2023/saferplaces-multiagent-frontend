<!-- ============================================================================= -->
<!-- GEO MAP TOPBAR - Controls and Drawing Tools -->
<!-- ============================================================================= -->

<!-- ============= TOP BAR: Controls and Tools ============= -->
<section class="topbar d-flex col align-items-center justify-content-center gap-3" aria-label="Map controls and drawing tools">

    <!-- ============= STYLE SELECTOR SECTION ============= -->
    <div id="mapStyleSelector" class="mapStyleSelector style-bar px-3 py-2 shadow justify-content-between">

        <div id="mapStyleSelectorHead" class="toolbar-head d-flex align-items-center" data-toggle="mapStyleSelectorBody" role="button" tabindex="0" aria-expanded="false">
            <span class="small text-secondary d-inline-flex align-items-center gap-1">
                <span class="material-symbols-outlined">map</span>
                Map style
            </span>
        </div>

        <div id="mapStyleSelectorBody" class="d-flex">
            <!-- Style Select Dropdown -->
            <!-- Options populated dynamically from BASEMAP_STYLES in _consts.js -->
            <select id="styleSelect" class="form-select form-select-sm bg-dark text-light border-secondary ms-2" aria-label="Select map style">
            </select>

            <!-- Reset View Button -->
            <button id="resetView" class="btn btn-success btn-sm fw-semibold" type="button" title="Reset map to default view">
                Reset view
            </button>
        </div>
    </div>

    <!-- ============= DRAW TOOLS TOOLBAR ============= -->
    <div id="drawToolbar" class="drawToolbar draw-toolbar px-3 py-2" role="toolbar" aria-label="Draw tools">

        <div id="drawToolbarHead" class="toolbar-head d-flex align-items-center" data-toggle="drawToolbarBody" role="button" tabindex="0" aria-expanded="false">
            <span class="small text-secondary d-inline-flex align-items-center gap-1">
                <span class="material-symbols-outlined">draw</span>
                Draw tools
            </span>
        </div>

        <!-- Collections Panel (Outside overflow:hidden container) -->
        <div id="dtCollectionsPanel" class="dt-panel hidden" aria-label="Draw collections panel" role="region">

            <!-- Panel Header -->
            <div class="dt-panel-head">
                <strong>Drawn Collections</strong>
                <span class="dt-badge" id="dtCollectionsCount" aria-label="Number of collections">
                    0
                </span>
            </div>

            <!-- Collections List -->
            <div id="dtCollectionsList" class="dt-panel-list" role="list">
            </div>
        </div>

        <div id="drawToolbarBody">
            <!-- Separator -->
            <div class="dt-sep ms-3" aria-hidden="true"></div>

            <!-- Collections Button -->
            <button id="dtCollections" class="dt-btn" type="button" title="View drawn collections" aria-label="Collections" aria-controls="dtCollectionsPanel">
                <span class="material-symbols-outlined">inventory_2</span>
            </button>

            <!-- Separator -->
            <div class="dt-sep" aria-hidden="true"></div>

            <!-- Point Button -->
            <button id="dtPoint" class="dt-btn" type="button" title="Draw point" aria-label="Point">
                <span class="material-symbols-outlined">location_on</span>
            </button>

            <!-- Line Button -->
            <button id="dtLine" class="dt-btn" type="button" title="Draw line" aria-label="Line" disabled>
                <span class="material-symbols-outlined">polyline</span>
            </button>

            <!-- Bounding Box Button -->
            <button id="dtBbox" class="dt-btn" type="button" title="Draw bounding box" aria-label="BBox">
                <span class="material-symbols-outlined">crop_free</span>
            </button>

            <!-- Polygon Button -->
            <button id="dtPoly" class="dt-btn" type="button" title="Draw polygon" aria-label="Polygon">
                <span class="material-symbols-outlined">pentagon</span>
            </button>

            <!-- Separator -->
            <div class="dt-sep" aria-hidden="true"></div>

            <!-- Edit Button -->
            <button id="dtEdit" class="dt-btn" type="button" title="Edit shapes" aria-label="Edit">
                <span class="material-symbols-outlined">edit</span>
            </button>

            <!-- Delete Button -->
            <button id="dtDel" class="dt-btn dt-danger" type="button" title="Delete shapes" aria-label="Delete" disabled>
                <span class="material-symbols-outlined">delete</span>
            </button>
            
            <div class="dt-sep" aria-hidden="true"></div>

            <!-- Confirmation Buttons (Initially Hidden) -->
            <div id="draw-confirm" class="gap-1 closed">

                <!-- Separator -->

                <!-- Save Button -->
                <button id="dtSave" class="dt-btn dt-success" type="button" title="Save drawn shapes" aria-label="Save">
                    <span class="material-symbols-outlined">check</span>
                </button>

                <!-- Cancel Button -->
                <button id="dtCancel" class="dt-btn dt-danger" type="button" title="Cancel drawing" aria-label="Cancel">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
        </div>


    </div>

    <!-- ============= IMMERSIVE VIEWS TOOLBAR ============= -->
    <div id="immersiveViewsToolbar" class="immersiveViewsToolbar draw-toolbar px-3 py-2" role="toolbar" aria-label="Immersive view options">

        <div id="immersiveViewsToolbarHead" class="toolbar-head d-flex align-items-center" data-toggle="immersiveViewsToolbarBody" role="button" tabindex="0" aria-expanded="false">
            <span class="small text-secondary d-inline-flex align-items-center gap-1">
                <span class="material-symbols-outlined">simulation</span>
                Immersive views
            </span>
        </div>

        <div id="immersiveViewsToolbarBody">
            <!-- 3D Mode Button -->
            <button id="btnCesiumLaunch" class="btn btn-success btn-sm fw-semibold text-nowrap mx-2" type="button" title="Launch 3D mode">
                3D 🌍
            </button>

            <!-- Virtual Reality Button -->
            <button id="btnVRLaunch" class="btn btn-success btn-sm fw-semibold text-nowrap" type="button" title="Launch virtual reality mode">
                VR 🥽
            </button>
        </div>
    </div>

    <!-- ============= IDENTIFY INDICATOR ============= -->
    <div id="identifyIndicator" class="draw-toolbar px-3 py-2 d-none" role="status" aria-label="Identify mode active">
        <button id="btnStopIdentify" class="btn btn-warning btn-sm fw-semibold d-inline-flex align-items-center gap-1" type="button" title="Exit identify mode">
            <span class="material-symbols-outlined" style="font-size:16px;">info</span>
            Identify
        </button>
    </div>

</section>
