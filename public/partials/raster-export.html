<!-- ============================================================================= -->
<!-- RASTER EXPORT MODAL - Export sculpted DEM: download or register as layer    -->
<!-- ============================================================================= -->

<section
    id="rasterExportModal"
    class="layer-reg hidden"
    aria-modal="true"
    role="dialog"
    aria-label="Export DEM GeoTIFF">

    <!-- ============= CARD ============= -->
    <div class="layer-reg-card">

        <!-- ============= HEADER ============= -->
        <h6 class="mb-1">Export DEM GeoTIFF</h6>
        <p class="small text-secondary mb-3">
            Download the sculpted DEM or upload it to your project and register it as a layer.
            When registering, the raster is automatically aligned to the source DEM.
        </p>

        <!-- ============= DOWNLOAD SECTION ============= -->
        <div class="d-flex gap-2 mb-3">
            <button
                id="reDownload"
                class="btn btn-outline-light btn-sm flex-fill"
                type="button"
                title="Download GeoTIFF file">
                <span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">download</span>
                Download
            </button>
        </div>

        <div class="text-secondary small mb-2" style="text-align:center;">— or register as layer —</div>

        <!-- ============= REGISTER SECTION ============= -->
        <div class="mb-2">
            <label class="form-label small" for="reTitle">
                Title
                <span class="text-danger" title="Required">*</span>
            </label>
            <input
                id="reTitle"
                class="form-control form-control-sm"
                type="text"
                placeholder="e.g., Sculpted DEM"
                aria-label="Layer title (required)"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label small" for="reDesc">Description</label>
            <textarea
                id="reDesc"
                class="form-control form-control-sm"
                rows="2"
                placeholder="Brief description…"
                spellcheck="false"
                aria-label="Layer description (optional)">
            </textarea>
        </div>

        <!-- ============= STATUS MESSAGE ============= -->
        <div id="reStatus" class="small mb-2 d-none"></div>

        <!-- ============= ACTION BUTTONS ============= -->
        <div class="d-flex justify-content-end gap-2">
            <button
                id="reCancel"
                class="btn btn-outline-light btn-sm"
                type="button">
                Cancel
            </button>
            <button
                id="reRegister"
                class="btn btn-success btn-sm"
                type="button"
                title="Align to source DEM, convert to COG and register as layer">
                Register layer
            </button>
        </div>

    </div>
</section>
