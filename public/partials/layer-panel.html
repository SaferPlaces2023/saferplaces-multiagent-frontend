<!-- Sidebar SINISTRA -->
<button class="btn btn-secondary btn-sm toggle-btn" id="toggleBtn">☰</button>
<aside class="sidebar closed shadow-lg" id="sidebar">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <strong>Layers</strong>
        <span class="badge bg-success" id="layerCount">0</span>
    </div>

    <!-- 🔹 Sezione: Layers del progetto -->
    <div class="card p-3 mb-3">
        <div class="d-flex align-items-center justify-content-between mb-2">
            <span class="small text-secondary">Layers del progetto</span>
            <button id="reloadLayers" class="btn btn-outline-light btn-sm">↻</button>
        </div>
        <div id="projectLayersList" class="layer-list small">
            <div class="text-secondary">Nessun layer (ancora).</div>
        </div>
    </div>

    <!-- 🔸 Foldable: Aggiungi vector -->
    <div class="card p-0 mb-3">
        <button class="btn w-100 text-start px-3 py-2 d-flex justify-content-between align-items-center" data-bs-toggle="collapse" data-bs-target="#addVectorWrap" aria-expanded="false">
            <span><strong>Aggiungi vector layer</strong></span>
            <span class="small text-secondary">apri/chiudi</span>
        </button>
        <div id="addVectorWrap" class="collapse px-3 pb-3 pt-1">
            
            <label class="form-label small">GeoJSON (URL)</label>
            <div class="input-group input-group-sm mb-2">
                <input id="geojsonUrl" class="form-control" placeholder="https://…/dati.geojson">
                <button class="btn btn-outline-light" id="btnGeojson">Aggiungi</button>
            </div>
            
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="regSwitchVector" checked>
                <label class="form-check-label small" for="regSwitchVector">Registra nel progetto</label>
            </div>

            <!-- <label class="form-label small">Shapefile .zip (URL)</label>
            <div class="input-group input-group-sm">
                <input id="shpUrl" class="form-control" placeholder="https://…/dati.zip">
                <button class="btn btn-outline-light" id="btnShp">Aggiungi</button>
            </div>
            <div class="small text-secondary mt-1">Zip con .shp/.dbf/.prj/.shx</div> -->
        </div>
    </div>

    <!-- 🔸 Foldable: Aggiungi raster -->
    <div class="card p-0">
        <button class="btn w-100 text-start px-3 py-2 d-flex justify-content-between align-items-center" data-bs-toggle="collapse" data-bs-target="#addRasterWrap" aria-expanded="false">
            <span><strong>Aggiungi raster layer</strong></span>
            <span class="small text-secondary">apri/chiudi</span>
        </button>
        <div id="addRasterWrap" class="collapse px-3 pb-3 pt-1">
            <div class="form-check form-switch mb-2">
                <input class="form-check-input" type="checkbox" id="regSwitchRaster" checked>
                <label class="form-check-label small" for="regSwitchRaster">Registra nel progetto</label>
            </div>
            
            <label class="form-label small">COG (single band) (URL)</label>
            <div class="input-group input-group-sm mb-2">
                <input id="cogUrl" class="form-control" placeholder="https://…/raster.tif">
                <select id="cmap" class="form-select bg-dark text-light">
                    <option>viridis</option>
                    <option>inferno</option>
                    <option>magma</option>
                    <option>plasma</option>
                    <option>blues</option>
                    <option>gray</option>
                    <option>terrain</option>
                </select>
                <button class="btn btn-outline-light" id="btnCog">Aggiungi</button>
            </div>

            <label class="form-label small">Opacità raster</label>
            <input type="range" id="rasterOpacity" min="0" max="1" step="0.05" value="0.85" class="form-range">
        </div>
    </div>
</aside>
