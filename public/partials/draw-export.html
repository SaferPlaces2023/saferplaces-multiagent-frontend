<!-- ============================================================================= -->
<!-- DRAW EXPORT MODAL - Export GeoJSON: download or register as layer           -->
<!-- ============================================================================= -->

<section
    id="drawExportModal"
    class="layer-reg hidden"
    aria-modal="true"
    role="dialog"
    aria-label="Export GeoJSON">

    <!-- ============= CARD ============= -->
    <div class="layer-reg-card">

        <!-- ============= HEADER ============= -->
        <h6 class="mb-1">Export GeoJSON</h6>
        <p class="small text-secondary mb-3">
            Download the collection or upload it to your project and register it as a layer.
        </p>

        <!-- ============= DOWNLOAD SECTION ============= -->
        <div class="d-flex gap-2 mb-3">
            <button
                id="deDownload"
                class="btn btn-outline-light btn-sm flex-fill"
                type="button"
                title="Download GeoJSON file">
                <span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">download</span>
                Download
            </button>
        </div>

        <div class="text-secondary small mb-2" style="text-align:center;">— or register as layer —</div>

        <!-- ============= REGISTER SECTION ============= -->
        <div class="mb-2">
            <label class="form-label small" for="deTitle">
                Title
                <span class="text-danger" title="Required">*</span>
            </label>
            <input
                id="deTitle"
                class="form-control form-control-sm"
                type="text"
                placeholder="e.g., My drawn area"
                aria-label="Layer title (required)"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label small" for="deDesc">Description</label>
            <textarea
                id="deDesc"
                class="form-control form-control-sm"
                rows="2"
                placeholder="Brief description…"
                spellcheck="false"
                aria-label="Layer description (optional)">
            </textarea>
        </div>

        <!-- ============= STATUS MESSAGE ============= -->
        <div id="deStatus" class="small mb-2 d-none"></div>

        <!-- ============= ACTION BUTTONS ============= -->
        <div class="d-flex justify-content-end gap-2">
            <button
                id="deCancel"
                class="btn btn-outline-light btn-sm"
                type="button">
                Cancel
            </button>
            <button
                id="deRegister"
                class="btn btn-success btn-sm"
                type="button"
                title="Upload to S3 and register as layer">
                Register layer
            </button>
        </div>

    </div>
</section>
