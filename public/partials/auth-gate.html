<!-- ============================================================================= -->
<!-- AUTH GATE OVERLAY - Full-screen authentication and project selection modal -->
<!-- ============================================================================= -->

<!-- ============= LOGO SECTION ============= -->
<div 
    id="authGateLogo" 
    class="d-flex column align-items-center justify-content-center w-100 logo-container hidden"
    role="banner">
    
    <!-- Logo Container -->
    <div class="morph-pro">
        <img 
            class="logo" 
            src="public/imgs/SaferPlacesLogo.png" 
            alt="SaferPlaces Logo" />
    </div>
    
    <!-- Brand Title -->
    <h1>SaferPlaces AI Agent</h1>
</div>

<!-- ============= MAIN AUTH GATE SECTION ============= -->
<section 
    id="authGate" 
    class="auth-gate hidden" 
    aria-modal="true" 
    role="dialog"
    aria-label="Authentication and project selection">
    
    <!-- ============= AUTH CARD (Main container) ============= -->
    <div class="auth-card">
        
        <!-- ============= STEP 1: USER VERIFICATION ============= -->
        <div id="authStepUser">
            <h6 class="mb-2">Welcome 👋</h6>
            <p class="small text-secondary mb-3">
                Insert your <strong>user_id</strong> to continue.
            </p>
            
            <!-- User ID Input -->
            <div class="input-group input-group-sm mb-2">
                <input 
                    id="authUserId" 
                    class="form-control" 
                    type="text"
                    placeholder="e.g., tommaso.r"
                    aria-label="User ID">
                <button 
                    id="authSubmit" 
                    class="btn btn-success"
                    type="button"
                    title="Verify user and load projects">
                    Continue
                </button>
            </div>
            
            <!-- Error Message -->
            <div 
                id="authError" 
                class="small text-danger d-none"
                role="alert">
                Check failed. Try again.
            </div>
        </div>

        <!-- ============= STEP 2: PROJECT SELECTION/CREATION ============= -->
        <div id="authProjectArea" class="d-none mt-3">
            
            <!-- Header: User Badge + Mode Switch -->
            <div class="d-flex align-items-center justify-content-between mb-2">
                <div 
                    id="authUserBadge" 
                    class="small text-secondary"
                    aria-label="Current user"></div>
                
                <!-- Mode Toggle: Select existing / Create new -->
                <div 
                    id="authModeWrap" 
                    class="form-check form-switch d-none d-flex align-items-center gap-2">
                    <input 
                        class="form-check-input" 
                        type="checkbox" 
                        id="authModeSwitch"
                        aria-label="Toggle between select and create project mode">
                    </input>
                    <label class="form-check-label small" for="authModeSwitch">
                        New Project
                    </label>
                </div>
            </div>

            <!-- Section 1: Select Existing Project -->
            <fieldset id="authSectionSelect">
                <legend class="form-label small">Select project</legend>
                <select 
                    id="authProjectSelect" 
                    class="form-select form-select-sm mb-2"
                    aria-label="Choose an existing project">
                </select>
            </fieldset>

            <!-- Section 2: Create New Project -->
            <fieldset id="authSectionCreate" disabled>
                <legend class="form-label small">Create new project</legend>
                <div class="input-group input-group-sm mb-2">
                    <input 
                        id="authProjectName" 
                        class="form-control" 
                        type="text"
                        placeholder="e.g., dev-023"
                        aria-label="New project name">
                </div>
                
                <!-- Error Message for Project -->
                <div 
                    id="authProjError" 
                    class="small text-danger d-none"
                    role="alert">
                    Creation failed.
                </div>
            </fieldset>

            <!-- Action Button: Proceed -->
            <button 
                id="authProceed" 
                class="btn btn-success btn-sm w-100 mt-1"
                type="button"
                title="Enter the selected or created project">
                Enter
            </button>
        </div>
    </div>
    
</section>
