<!-- Auth Gate Overlay -->
<div id="authGateLogo" class="d-flex column align-items-center justify-content-center w-100 logo-container hidden">
    <div class="morph-pro">
        <!-- <img class="logo" src="imgs/SaferPlacesLogoInv.png" alt="Logo" /> -->
        <img class="logo" src="imgs/SaferPlacesLogo.png" alt="Logo" />
        <!-- <img class="logo" src="imgs/SaferPlacesLogoBW.png" alt="Logo" /> -->
        <!-- <img class="logo" src="imgs/SaferPlacesLogoMask.png" alt="Logo" /> -->
    </div>
    <h1>SaferPlaces AI Agent</h1>
</div>
<section id="authGate" class="auth-gate hidden" aria-modal="true" role="dialog">
    <div class="auth-card">
        <!-- STEP: USER -->
        <div id="authStepUser">
            <h6 class="mb-2">Benvenuto 👋</h6>
            <p class="small text-secondary mb-3">Inserisci il tuo <strong>user_id</strong> per continuare.</p>
            <div class="input-group input-group-sm mb-2">
                <input id="authUserId" class="form-control" placeholder="es. tommaso.r">
                <button id="authSubmit" class="btn btn-success">Continua</button>
            </div>
            <div id="authError" class="small text-danger d-none">Verifica non riuscita. Riprova.</div>
        </div>

        <!-- AREA PROGETTO (stessa card) -->
        <div id="authProjectArea" class="d-none mt-3">
            <div class="d-flex align-items-center justify-content-between mb-2">
                <div id="authUserBadge" class="small text-secondary"></div>
                <!-- switch modalità -->
                <div id="authModeWrap" class="form-check form-switch d-none">
                    <input class="form-check-input" type="checkbox" id="authModeSwitch">
                    <label class="form-check-label small" for="authModeSwitch">
                        Nuovo progetto
                    </label>
                </div>
            </div>

            <!-- Seleziona progetto esistente -->
            <fieldset id="authSectionSelect">
                <label class="form-label small">Seleziona progetto</label>
                <select id="authProjectSelect" class="form-select form-select-sm mb-2"></select>
            </fieldset>

            <!-- Crea nuovo progetto -->
            <fieldset id="authSectionCreate" disabled>
                <label class="form-label small">Crea nuovo progetto</label>
                <div class="input-group input-group-sm mb-2">
                    <input id="authProjectName" class="form-control" placeholder="es. dev-023">
                </div>
                <div id="authProjError" class="small text-danger d-none">Creazione non riuscita.</div>
            </fieldset>

            <!-- pulsante azione unica -->
            <button id="authProceed" class="btn btn-success btn-sm w-100 mt-1">Entra</button>
        </div>
    </div>
</section>
