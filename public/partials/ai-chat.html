<!-- Chat AI (RIGHT SIDEBAR) -->
<section class="chatbox" id="chatBox" aria-label="AI assisted chat">
    
    <!-- ============= RESIZE HANDLE ============= -->
    <div class="chat-resize-handle" id="chatResizeHandle" title="Drag to resize"></div>
    
    <!-- ============= HEADER ============= -->
    <div class="chat-header">
        <!-- Title Section -->
        <div class="d-flex align-items-center gap-2">
            <span class="badge bg-success">AI</span>
            <span class="chat-title p-2">Saferplaces Agent</span>
        </div>
        
        <!-- Action Buttons Section -->
        <div class="d-flex align-items-center gap-2">
            <button 
                id="chatSettingsBtn" 
                class="btn btn-outline-light btn-sm" 
                title="Open chat settings">
                Settings
            </button>
            <button 
                id="clearChat" 
                class="btn btn-outline-light btn-sm" 
                title="Start new chat thread">
                Clean
            </button>
            <button 
                id="minChat" 
                class="btn btn-secondary btn-sm" 
                title="Minimize/Expand chat">
                ⤡
            </button>
        </div>
    </div>
    
    <!-- ============= SETTINGS PANEL ============= -->
    <div data-include="public/partials/ai-chat-settings.html"></div>

    <!-- ============= MESSAGE BODY ============= -->
    <div class="chat-body" id="chatBody">
        <div class="bubble ai">
            Welcome! I'm here to help you with geospatial analysis, flood simulations, weather data, and more.<br>
            If you want details about what I can do, just ask and I'll guide you!.
        </div>
    </div>

    <!-- ============= INPUT AREA ============= -->
    <div class="chat-input d-flex align-items-end">
        <textarea 
            id="chatInput" 
            class="form-control form-control-sm" 
            rows="2"
            placeholder="Write a message… (Enter to send)"
            aria-label="Chat message input"></textarea>
        <button 
            id="sendMsg" 
            class="btn btn-success btn-sm fw-semibold"
            title="Send message (Enter)">
            <span class="material-symbols-outlined">arrow_upward</span>
        </button>
    </div>

</section>
