<!-- ============================================================================= -->
<!-- LAYER CONFIG MODAL - Modal for configuring layer parameters (surface_type...) -->
<!-- ============================================================================= -->

<section
    id="layerConfigModal"
    class="layer-reg hidden"
    aria-modal="true"
    role="dialog"
    aria-label="Layer configuration">

    <!-- ============= CONFIG CARD ============= -->
    <div class="layer-reg-card">

        <!-- ============= HEADER ============= -->
        <h6 class="mb-1">Configure layer</h6>
        <p class="small text-secondary mb-3" id="lcLayerTitle"></p>

        <!-- ============= SURFACE TYPE ============= -->
        <div class="mb-2">
            <label class="form-label small" for="lcSurfaceType">Surface type</label>
            <select
                id="lcSurfaceType"
                class="form-select form-select-sm"
                aria-label="Layer surface type">
                <!-- options populated dynamically by layer-panel.js -->
            </select>
            <small class="text-secondary d-block mt-1">
                Determines how the layer is rendered and processed.
            </small>
        </div>

        <!-- ============= LAYER GROUP ============= -->
        <div class="mb-2">
            <label class="form-label small" for="lcGroupSelect">Group</label>
            <select
                id="lcGroupSelect"
                class="form-select form-select-sm mb-1"
                aria-label="Layer group">
                <!-- options populated dynamically by layer-panel.js -->
            </select>
            <input
                type="text"
                id="lcGroupNew"
                class="form-control form-control-sm d-none"
                placeholder="New group name…"
                aria-label="New group name" />
            <small class="text-secondary d-block mt-1">
                Organises layers into collapsible groups in the panel.
            </small>
        </div>

        <!-- ============= ACTION BUTTONS ============= -->
        <div class="d-flex justify-content-end gap-2 mt-3">
            <button
                id="lcCancel"
                class="btn btn-outline-light btn-sm"
                type="button"
                title="Cancel configuration">
                Cancel
            </button>
            <button
                id="lcSave"
                class="btn btn-success btn-sm"
                type="button"
                title="Save configuration">
                Save
            </button>
        </div>

        <!-- ============= ERROR MESSAGE ============= -->
        <div
            id="lcError"
            class="small text-danger d-none mt-2"
            role="alert"
            aria-live="polite">
        </div>

    </div>

</section>
