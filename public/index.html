<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SaferPlaces Agent • WebApp</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- MapLibre -->
    <link href="https://unpkg.com/maplibre-gl@5.21.1/dist/maplibre-gl.css" rel="stylesheet" />
    <!-- Google icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />


    <!-- Early theme: apply saved preference before first paint (prevents flash) -->
    <script>if(localStorage.getItem('sp-theme')==='light')document.documentElement.classList.add('light-theme');</script>

    <!-- App CSS - Reorganized system -->
    <!-- Design tokens and base styles -->
    <link href="public/css/design-tokens.css" rel="stylesheet">
    <link href="public/css/layout.css" rel="stylesheet">
    
    <!-- Reusable components -->
    <link href="public/css/components.css" rel="stylesheet">
    
    <!-- Feature-specific styles -->
    <link href="public/css/branding.css" rel="stylesheet">
    <link href="public/css/auth-gate.css" rel="stylesheet">
    <link href="public/css/map-editor.css" rel="stylesheet">
    <link href="public/css/sidebars.css" rel="stylesheet">
    <link href="public/css/chat-interface.css" rel="stylesheet">
    <link href="public/css/time-slider.css" rel="stylesheet">
    <link href="public/css/modals.css" rel="stylesheet">
    <link href="public/css/notifications.css" rel="stylesheet">
    <!-- Light theme overrides (loaded last so it wins) -->
    <link href="public/css/theme-light.css" rel="stylesheet">
    <!-- Layer symbology modal -->
    <link href="public/css/layer-symbology.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

    <div id="authGateLogo2" class="d-flex row align-items-center logo-container2">
        <div class="morph-pro2">
            <img class="logo2" src="public/imgs/SaferPlacesLogo.png" alt="Logo" />
        </div>
        <p>SaferPlaces AI Agent</p>
    </div>

    <!-- Placeholder dei parziali -->
    <div id="appRoot" class="app-container">

        <!-- Chat Sidebar (left side - fixed width + resizable) -->
        <div class="chat-sidebar-wrapper">
            <div style="height: 100%;" data-include="public/partials/ai-chat.html"></div>
        </div>

        <!-- Map Container (flex: 1) -->
        <div class="map-container">
            <div data-include="public/partials/geo-map.html"></div>
            <div data-include="public/partials/layer-register.html"></div>
            <div data-include="public/partials/layer-config.html"></div>
            <div data-include="public/partials/draw-export.html"></div>
            <div data-include="public/partials/raster-export.html"></div>
            <div data-include="public/partials/time-slider.html"></div>
            <!-- DEM Sculpt panel – overlays the map when open -->
            <div id="sculptPanel" class="sculpt-panel hidden">
                <button id="sculptCloseBtn" class="sculpt-close-btn" title="Back to map">
                    <span class="material-symbols-outlined">arrow_back</span> Back to Map
                </button>
                <iframe id="sculptIframe" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Right Sidebar (user + layers - fixed width + resizable) -->
        <div class="left-sidebar-wrapper" id="leftSidebarWrapper">
            <!-- Resize handle (left edge, facing the map) -->
            <div class="left-resize-handle" id="leftResizeHandle" title="Drag to resize"></div>
            <!-- Panel content area -->
            <div class="left-sidebar-panel" id="leftSidebarPanel">
                <div style="height:100%;" data-include="public/partials/user-panel.html"></div>
                <div style="height:100%;" data-include="public/partials/layer-panel.html"></div>
            </div>
            <!-- Button strip (always visible, at outer-right edge) -->
            <div class="left-sidebar-strip">
                <button class="btn btn-primary btn-sm" id="toggleUserBtn" type="button" title="Open user panel" aria-label="Toggle user panel">👤</button>
                <button class="btn btn-secondary btn-sm" id="toggleBtn" type="button" title="Toggle layer panel" aria-label="Toggle layer panel">☰</button>
                <button class="btn btn-secondary btn-sm" id="themeToggleBtn" type="button" title="Switch to light theme" aria-label="Toggle light/dark theme">☀️</button>
            </div>
        </div>
    </div>
    <!-- Autenticazione -->
    <div data-include="public/partials/auth-gate.html"></div>

    <!-- Toast stack (bottom-center) -->
    <div id="toastStack" aria-live="polite" aria-atomic="true"></div>

    <!-- Layer Symbology Modal (vector) -->
    <div id="layerSymbologyModal" class="lsym-overlay hidden">
        <div class="lsym-modal">
            <div class="lsym-modal-header">
                <div class="lsym-modal-header-main">
                    <div class="lsym-title-row">
                        <h2 id="lsym-title">Layer symbology</h2>
                        <span class="lsym-badge">vector</span>
                    </div>
                    <div class="lsym-meta" id="lsym-meta"></div>
                </div>
                <button id="lsym-close-btn" class="lsym-close-x" type="button" aria-label="Close">&#x2715;</button>
            </div>
            <div class="lsym-body" id="lsym-body"></div>
            <div class="lsym-footer">
                <button id="lsym-reset-btn" type="button">reset</button>
                <button id="lsym-apply-btn" type="button" class="lsym-btn-primary">apply</button>
            </div>
        </div>
    </div>

    <!-- Layer Raster Symbology Modal -->
    <div id="layerRasterSymbologyModal" class="lsym-overlay hidden">
        <div class="lsym-modal">
            <div class="lsym-modal-header">
                <div class="lsym-modal-header-main">
                    <div class="lsym-title-row">
                        <h2 id="lrsym-title">Raster symbology</h2>
                        <span class="lsym-badge">raster</span>
                    </div>
                    <div class="lsym-meta" id="lrsym-meta"></div>
                </div>
                <button id="lrsym-close-btn" class="lsym-close-x" type="button" aria-label="Close">&#x2715;</button>
            </div>
            <div class="lsym-body" id="lrsym-body"></div>
            <div class="lsym-footer">
                <button id="lrsym-reset-btn" type="button">reset</button>
                <button id="lrsym-apply-btn" type="button" class="lsym-btn-primary">apply</button>
            </div>
        </div>
    </div>

    <!-- Vendor JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl@5.21.1/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/@geomatico/maplibre-cog-protocol/dist/index.js"></script>
    <script src="https://unpkg.com/shpjs@latest/dist/shp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>

    <!-- App JS -->
    <script src="public/js/_consts.js"></script>
    <script src="public/js/_utils.js"></script>
    <script src="public/js/draw-tools.js"></script>
    <script src="public/js/geo-map.js"></script>
    <script src="public/js/user-panel.js"></script>
    <script src="public/js/layer-panel.js"></script>
    <script src="public/js/layer-symbology.js"></script>
    <script src="public/js/layer-raster-symbology.js"></script>
    <script src="public/js/ai-chat.js"></script>
    <script src="public/js/ai-chat-settings.js"></script>
    <script src="public/js/auth-gate.js"></script>
    <script src="public/js/time-slider.js"></script>
    <script src="public/js/toasts.js"></script>
    <script src="public/js/app.js"></script>

    <!-- Tooltips globali -->
    <!-- <div id="aiChatSettingsTooltip" class="ai-chat-settings-tooltip closed"></div> -->

</body>

</html>
