<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Map</title>
    <script src="https://unpkg.com/maplibre-gl@v5.6.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@v5.6.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <script type="module">
        const API_KEY = 'eKTWCeR7phLWdM7M4myh';
        const map = new maplibregl.Map({
            container: 'map',
            style: `https://api.maptiler.com/maps/winter-v2/style.json?key=${API_KEY}`,
            center: [11.40416, 47.26475],
            zoom: 12,
            pitch: 70,
            maxPitch: 85
        });

        map.on('load', () => {
            // Add new sources and layers
            map.addSource("terrain", {
                "type": "raster-dem",
                "url": `https://api.maptiler.com/tiles/terrain-rgb-v2/tiles.json?key=${API_KEY}`
            });
            map.setTerrain({
                source: "terrain"
            });
        });
    </script>
</body>

</html>
